name: Daily AI Technical Research

on:
  schedule:
    - cron: '0 1 * * *' # 01:00 UTC = 08:00 AM VN
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Research Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/main.py
        
      - name: Commit and push results
        run: |
          git config --global user.name "AI Research Bot"
          git config --global user.email "bot@github.com"
          git add data/latest_news.json index.html
          git commit -m "Auto-update: Daily technical news research and static dashboard [skip ci]" || echo "No changes to commit"
          git push
