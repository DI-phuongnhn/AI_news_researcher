<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Researcher Dashboard</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        #last-updated {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .keywords {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .lang-group {
            margin-bottom: 1.25rem;
            display: flex;
            align-items: flex-start;
        }

        .lang-label {
            display: inline-block;
            min-width: 50px;
            font-weight: bold;
            color: var(--accent);
            padding-top: 4px;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: #334155;
            color: #cbd5e1;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .tag:hover {
            background: var(--accent);
            color: var(--primary-bg);
            border-color: #f1f5f9;
            transform: translateY(-1px);
        }

        .tag.hot::after {
            content: "🔥 Hot";
            background: #ef4444;
            color: white;
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .search-container {
            margin-bottom: 2rem;
        }

        #searchBar {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #searchBar:focus {
            border-color: var(--accent);
        }

        #news-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .news-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .news-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .news-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            display: block;
            margin-bottom: 0.5rem;
        }

        .news-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .news-summary {
            line-height: 1.6;
            color: #cbd5e1;
            white-space: pre-line;
        }

        .badge {
            background: #334155;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .btn-refresh,
        .btn-action {
            background: var(--card-bg);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
        }

        .btn-refresh:hover,
        .btn-action:hover {
            background: var(--accent);
            color: var(--primary-bg);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        .date-section {
            margin-top: 3rem;
            margin-bottom: 2rem;
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
        }

        .date-section h2 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--accent);
        }

        .date-section .date-meta {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .pagination-btn {
            background: var(--card-bg);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pagination-btn:disabled {
            border-color: #334155;
            color: #334155;
            cursor: not-allowed;
        }

        .pagination-btn:not(:disabled):hover {
            background: var(--accent);
            color: var(--primary-bg);
        }

        #page-info {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>AI Technical Researcher</h1>
            <p id="last-updated">Đang tải dữ liệu...</p>
            <div style="margin-top: 1rem; display: flex; justify-content: center; gap: 10px;">
                <button onclick="fetchData()" class="btn-refresh">🔄 Cập nhật Dashboard</button>
                <a href="https://github.com/DI-phuongnhn/AI_news_researcher/actions" target="_blank"
                    class="btn-action">🚀 Chạy nghiên cứu mới (GitHub Actions)</a>
            </div>
        </header>

        <div id="quota-error" class="error-message" style="display: none;">
            ⚠️ <strong>Thông báo Quota API:</strong> Bot đã tiêu hết số lượt chạy miễn phí trong ngày hôm nay. Dữ liệu
            sẽ được cập nhật lại vào 8:00 sáng mai.
        </div>

        <div class="keywords">
            <h3
                style="margin-top: 0; margin-bottom: 1.5rem; color: var(--accent); font-size: 1.1rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem;">
                Trending Keywords
            </h3>
            <div id="keyword-clouds">
                <!-- Keywords will be injected here -->
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Tìm kiếm tin tức AI (title, nội dung, tag)..."
                onkeyup="filterNews()">
        </div>

        <div id="news-container">
            <div id="news-list">
                <div class="loading">Đang khởi tạo bản tin kỹ thuật...</div>
            </div>
        </div>

        <div class="pagination" id="pagination-controls" style="display: none;">
            <button id="prev-btn" class="pagination-btn" onclick="changePage(-1)">← Trang trước</button>
            <span id="page-info">Trang 1 / 1</span>
            <button id="next-btn" class="pagination-btn" onclick="changePage(1)">Trang sau →</button>
        </div>
    </div>

    <script>
        let allHistoricalData = [];
        let currentPage = 1;
        const itemsPerPage = 5; // 5 days per page

        async function fetchData() {
            try {
                // Try fetching all_news.json
                const response = await fetch('data/all_news.json');
                if (!response.ok) {
                    // Fallback to latest_news.json if history doesn't exist yet
                    console.log("Historical data not found, falling back to latest_news.json");
                    const fallbackResponse = await fetch('data/latest_news.json');
                    if (!fallbackResponse.ok) throw new Error('Không thể tải file dữ liệu');
                    const data = await fallbackResponse.json();
                    allHistoricalData = [data]; // Wrap in array
                } else {
                    allHistoricalData = await response.json();
                }

                renderPage(1);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('news-list').innerHTML = `<div class="loading">Lỗi: ${error.message}. Hãy đảm bảo file data/all_news.json hoặc data/latest_news.json tồn tại.</div>`;
            }
        }

        function renderPage(page) {
            currentPage = page;
            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = allHistoricalData.slice(start, end);

            // Dynamic Keywords: Aggregrate from all days on this page
            if (pageData.length > 0) {
                const combinedKeywords = pageData.map(d => d.keywords).join('\n\n');
                renderKeywords(combinedKeywords);
                document.getElementById('last-updated').innerText = `Dữ liệu trang ${page} (Mới nhất: ${new Date(pageData[0].timestamp).toLocaleString('vi-VN')})`;
            }

            const list = document.getElementById('news-list');
            list.innerHTML = '';

            if (pageData.length === 0) {
                list.innerHTML = '<div class="loading">Hiện chưa có dữ liệu nào được tổng hợp.</div>';
                return;
            }

            pageData.forEach(dayEntry => {
                const daySection = document.createElement('div');
                daySection.className = 'date-section';
                daySection.innerHTML = `
                    <h2>Nghiên cứu ngày: ${new Date(dayEntry.timestamp).toLocaleDateString('vi-VN')}</h2>
                    <div class="date-meta">Tìm thấy ${dayEntry.reports.length} bản tin kỹ thuật</div>
                `;

                const reportsHtml = dayEntry.reports.map(item => `
                    <div class="news-card" style="margin-bottom: 1.5rem">
                        <a href="${item.link}" class="news-title" target="_blank">${item.title}</a>
                        <div class="news-meta">
                            <span class="badge">${item.source}</span>
                            <span>${item.date ? new Date(item.date).toLocaleDateString('vi-VN') : ''}</span>
                        </div>
                        <div class="news-summary">${item.summary_vn}</div>
                    </div>
                `).join('');

                daySection.innerHTML += reportsHtml;
                list.appendChild(daySection);
            });

            updatePagination();
        }

        function updatePagination() {
            const totalPages = Math.ceil(allHistoricalData.length / itemsPerPage);
            const controls = document.getElementById('pagination-controls');

            if (totalPages <= 1) {
                controls.style.display = 'none';
                return;
            }

            controls.style.display = 'flex';
            document.getElementById('page-info').innerText = `Trang ${currentPage} / ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === totalPages;
        }

        function changePage(delta) {
            const nextP = currentPage + delta;
            renderPage(nextP);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderKeywords(keywords) {
            const clouds = document.getElementById('keyword-clouds');
            clouds.innerHTML = '';

            const structured = parseKeywords(keywords);

            // Logic for "Hot" tags: If a keyword appears in more than 1 entry on this page
            const allWords = keywords.split(/[\n,]+/).map(w => w.split(':').pop().trim().replace(/^\[|\]$/g, '')).filter(w => w);
            const counts = {};
            allWords.forEach(w => counts[w] = (counts[w] || 0) + 1);

            for (const [lang, words] of Object.entries(structured)) {
                if (words.length === 0) continue;

                // Remove duplicates in words list
                const uniqueWords = [...new Set(words)];

                const group = document.createElement('div');
                group.className = 'lang-group';
                group.innerHTML = `
                    <span class="lang-label">${lang}:</span>
                    <div class="tag-cloud">
                        ${uniqueWords.map(word => {
                    const isHot = counts[word] > 1;
                    return `<span class="tag ${isHot ? 'hot' : ''}" onclick="filterByTag('${word}')">${word}</span>`;
                }).join('')}
                    </div>
                `;
                clouds.appendChild(group);
            }
        }

        function parseKeywords(raw) {
            const structured = { 'EN': [], 'VN': [], 'JP': [] };
            if (raw.includes('Error:')) return structured;

            const sections = raw.split(/\n\n+/);
            sections.forEach(section => {
                const parts = section.split(':');
                if (parts.length >= 2) {
                    const lang = parts[0].trim().toUpperCase();
                    const words = parts[1].split(',').map(w => w.trim().replace(/^\[|\]$/g, ''));
                    if (structured[lang]) structured[lang] = words;
                }
            });
            return structured;
        }

        function filterByTag(tag) {
            let searchBar = document.getElementById('searchBar');
            if (searchBar.value === tag) {
                searchBar.value = '';
            } else {
                searchBar.value = tag;
            }
            filterNews();
            document.querySelector('.search-container').scrollIntoView({ behavior: 'smooth' });
        }

        function filterNews() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('news-card');
            let dateSections = document.getElementsByClassName('date-section');
            let hasResults = false;

            // 1. Filter individual news cards
            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toLowerCase();
                let isMatch = text.includes(input);
                cards[i].style.display = isMatch ? "" : "none";
                if (isMatch) hasResults = true;
            }

            // 2. Hide date sections if all their nested cards are hidden
            for (let i = 0; i < dateSections.length; i++) {
                let sectionCards = dateSections[i].getElementsByClassName('news-card');
                let sectionHasMatch = false;
                for (let j = 0; j < sectionCards.length; j++) {
                    if (sectionCards[j].style.display !== "none") {
                        sectionHasMatch = true;
                        break;
                    }
                }
                dateSections[i].style.display = sectionHasMatch ? "" : "none";
            }

            // 3. Show/hide 'No results' message
            let list = document.getElementById('news-list');
            let noResultMsg = document.getElementById('no-results-msg');

            if (!hasResults) {
                if (!noResultMsg) {
                    noResultMsg = document.createElement('div');
                    noResultMsg.id = 'no-results-msg';
                    noResultMsg.className = 'loading';
                    noResultMsg.style.marginTop = '2rem';
                    noResultMsg.innerHTML = `
                        <div style="font-size: 3rem; margin-bottom: 1rem;">🔍</div>
                        <h3>Không tìm thấy bản tin nào phù hợp</h3>
                        <p style="color: var(--text-dim)">Thử kết hợp các từ khóa khác hoặc xóa bớt nội dung tìm kiếm.</p>
                        <button onclick="clearSearch()" class="btn-refresh" style="margin-top: 1rem">Xóa tìm kiếm</button>
                    `;
                    list.appendChild(noResultMsg);
                }
                noResultMsg.style.display = "block";
            } else if (noResultMsg) {
                noResultMsg.style.display = "none";
            }
        }

        function clearSearch() {
            document.getElementById('searchBar').value = '';
            filterNews();
        }

        // Initial fetch
        fetchData();
    </script>
</body>

</html>
