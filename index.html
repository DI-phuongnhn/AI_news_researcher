<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Researcher Dashboard</title>
    <style>
        :root {
            /* Muted Dark Theme (Default) */
            --primary-bg: #1e272e;
            --card-bg: #2f3640;
            --accent: #a8d8ea; /* Pastel Light Blue */
            --accent-secondary: #ffdfd3; /* Peach */
            --accent-tertiary: #95adbe; /* Muted Blue-Grey */
            --text-main: #d2dae2;
            --text-dim: #808e9b;
            --border: #485460;
            --tag-bg: #485460;
            --tag-text: #d2dae2;
            --shadow: rgba(0, 0, 0, 0.2);
            --header-gradient: linear-gradient(135deg, #a8d8ea, #aa96da);
        }

        [data-theme="light"] {
            /* Muted Light Theme */
            --primary-bg: #f8f9fa;
            --card-bg: #ffffff;
            --accent: #95adbe; /* Muted Slate */
            --accent-secondary: #f0b1b1; /* Muted Rose */
            --accent-tertiary: #b2c2a3; /* Muted Sage */
            --text-main: #2f3542;
            --text-dim: #747d8c;
            --border: #ced6e0;
            --tag-bg: #f1f2f6;
            --tag-text: #2f3542;
            --shadow: rgba(0, 0, 0, 0.04);
            --header-gradient: linear-gradient(135deg, #95adbe, #d8a7b1);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 3rem;
            text-align: center;
            position: relative;
        }

        h1 {
            background: var(--header-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            font-size: 2.5rem;
            font-weight: 800;
        }

        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 6px var(--shadow);
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            border-color: var(--accent);
        }

        #last-updated {
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .keywords {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 8px 20px var(--shadow);
        }

        .lang-group {
            margin-bottom: 1.25rem;
            display: flex;
            align-items: flex-start;
        }

        .lang-label {
            display: inline-block;
            min-width: 60px;
            font-weight: 700;
            color: var(--accent-tertiary);
            padding-top: 4px;
            letter-spacing: 0.5px;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            background: var(--tag-bg);
            color: var(--tag-text);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .tag:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 12px var(--accent);
        }

        .tag.hot::after {
            content: "🔥 Hot";
            background: var(--accent-secondary);
            color: #2f3640;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 8px;
            margin-left: 8px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .controls-row {
            display: flex;
            gap: 15px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-container {
            flex: 2;
            min-width: 250px;
        }

        .date-selector-container {
            flex: 1;
            min-width: 200px;
        }

        #searchBar,
        #dateSelector {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        #searchBar:focus,
        #dateSelector:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255, 159, 243, 0.2);
        }

        #news-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        /* Responsive grid: 1 column on mobile/tablet */
        @media (max-width: 850px) {
            #news-list {
                grid-template-columns: 1fr;
            }
        }

        .news-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px var(--shadow);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .news-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--accent);
            opacity: 0.4;
        }

        .news-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px var(--shadow);
            border-color: var(--accent-tertiary);
        }

        .news-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            display: block;
            margin-bottom: 0.75rem;
            line-height: 1.4;
            transition: color 0.2s;
        }

        .news-title:hover {
            color: var(--accent);
        }

        .news-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        .news-summary {
            line-height: 1.6;
            color: var(--text-main);
            opacity: 0.9;
            white-space: pre-line;
            font-size: 0.9rem;
            flex-grow: 1;
        }

        .badge {
            background: var(--accent-tertiary);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-refresh,
        .btn-action {
            background: var(--card-bg);
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            box-shadow: 0 4px 12px rgba(255, 159, 243, 0.1);
        }

        .btn-refresh:hover,
        .btn-action:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 159, 243, 0.3);
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-dim);
            font-weight: 500;
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }

        .date-section {
            margin-top: 2rem;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px dashed var(--border);
            grid-column: 1 / -1;
        }

        .date-section h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-secondary);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-top: 4rem;
            margin-bottom: 5rem;
        }

        .pagination-btn {
            background: var(--card-bg);
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .pagination-btn:disabled {
            border-color: #334155;
            color: #334155;
            cursor: not-allowed;
        }

        .pagination-btn:not(:disabled):hover {
            background: var(--accent);
            color: var(--primary-bg);
        }

        #page-info {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container" style="max-width: 1200px;">
        <header>
            <button class="theme-toggle" onclick="toggleTheme()" title="Đổi giao diện">🌓</button>
            <h1>AI Technical Researcher</h1>
            <p id="last-updated">Đang tải dữ liệu...</p>
            <div style="margin-top: 1rem; display: flex; justify-content: center; gap: 10px;">
                <button onclick="fetchData()" class="btn-refresh">🔄 Cập nhật Dashboard</button>
                <a href="https://github.com/DI-phuongnhn/AI_news_researcher/actions" target="_blank"
                    class="btn-action">🚀 Chạy nghiên cứu mới (GitHub Actions)</a>
            </div>
        </header>

        <div id="quota-error" class="error-message" style="display: none;">
            ⚠️ <strong>Thông báo Quota API:</strong> Bot đã tiêu hết số lượt chạy miễn phí trong ngày hôm nay. Dữ liệu
            sẽ được cập nhật lại vào 8:00 sáng mai.
        </div>

        <div class="keywords">
            <h3
                style="margin-top: 0; margin-bottom: 1.5rem; color: var(--accent); font-size: 1.1rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem;">
                Trending Keywords
            </h3>
            <div id="keyword-clouds">
                <!-- Keywords will be injected here -->
            </div>
        </div>

        <div class="controls-row">
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="Tìm kiếm tin tức AI (title, nội dung, tag)..."
                    onkeyup="filterNews()">
            </div>
            <div class="date-selector-container">
                <select id="dateSelector" onchange="jumpToDate()">
                    <option value="">-- Chọn ngày xem nhanh --</option>
                </select>
            </div>
        </div>

        <div id="news-container">
            <div id="news-list">
                <div class="loading">Đang khởi tạo bản tin kỹ thuật...</div>
            </div>
        </div>

        <div class="pagination" id="pagination-controls" style="display: none;">
            <button id="prev-btn" class="pagination-btn" onclick="changePage(-1)">← Trang trước</button>
            <span id="page-info">Trang 1 / 1</span>
            <button id="next-btn" class="pagination-btn" onclick="changePage(1)">Trang sau →</button>
        </div>
    </div>

    <script>
        let allHistoricalData = [];
        let flattenedReports = [];
        let currentPage = 1;
        const itemsPerPage = 20;

        // Theme Management
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        initTheme();

        async function fetchData() {
            try {
                const response = await fetch('data/all_news.json');
                if (!response.ok) {
                    console.log("Historical data not found, falling back to latest_news.json");
                    const fallbackResponse = await fetch('data/latest_news.json');
                    if (!fallbackResponse.ok) throw new Error('Không thể tải file dữ liệu');
                    const data = await fallbackResponse.json();
                    allHistoricalData = [data];
                } else {
                    allHistoricalData = await response.json();
                }

                processData();
                renderDateSelector();
                renderPage(1);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('news-list').innerHTML = `<div class="loading">Lỗi: ${error.message}. Hãy đảm bảo file data/all_news.json hoặc data/latest_news.json tồn tại.</div>`;
            }
        }

        function processData() {
            flattenedReports = [];
            allHistoricalData.forEach(dayEntry => {
                const scanDate = new Date(dayEntry.timestamp);
                const displayGroupDate = scanDate.toLocaleDateString('vi-VN');

                dayEntry.reports.forEach(report => {
                    const itemDate = report.date ? new Date(report.date) : scanDate;
                    
                    let priority = 1;
                    const src = (report.source || "").toLowerCase();
                    if (src.includes('x (') || src.includes('facebook') || src.includes('reddit')) {
                        priority = 3;
                    } else if (src.includes('duckduckgo')) {
                        priority = 2;
                    }

                    flattenedReports.push({
                        ...report,
                        sortToken: scanDate.getTime(),
                        itemSortToken: itemDate.getTime(),
                        priority: priority,
                        runTimestamp: dayEntry.timestamp,
                        displayDate: displayGroupDate,
                        keywords: dayEntry.keywords 
                    });
                });
            });

            // Sort logic: Scan Run (newest first) -> Priority (Social first) -> Post Date
            flattenedReports.sort((a, b) => {
                // Secondary sort by Priority (Social > Search > Others) within the same date
                if (b.displayDate === a.displayDate) {
                    if (b.priority !== a.priority) {
                        return b.priority - a.priority;
                    }
                    // Sort by scan run time within the same day
                    if (b.sortToken !== a.sortToken) {
                        return b.sortToken - a.sortToken;
                    }
                    return b.itemSortToken - a.itemSortToken;
                }
                // Primary sort by Scan Date
                return b.sortToken - a.sortToken;
            });
        }

        function renderDateSelector() {
            const selector = document.getElementById('dateSelector');
            selector.innerHTML = '<option value="">-- Chọn ngày xem nhanh --</option>';
            
            // Get unique dates in order
            const dates = [...new Set(flattenedReports.map(r => r.displayDate))];
            dates.forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                option.innerText = date;
                selector.appendChild(option);
            });
        }

        function jumpToDate() {
            const selectedDate = document.getElementById('dateSelector').value;
            if (!selectedDate) return;

            const index = flattenedReports.findIndex(r => r.displayDate === selectedDate);
            if (index !== -1) {
                const targetPage = Math.ceil((index + 1) / itemsPerPage);
                renderPage(targetPage);

                setTimeout(() => {
                    const headers = document.getElementsByClassName('date-header-text');
                    for (let h of headers) {
                        if (h.innerText.includes(selectedDate)) {
                            h.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            break;
                        }
                    }
                }, 150);
            }
        }

        function renderPage(page) {
            currentPage = page;
            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = flattenedReports.slice(start, end);

            if (pageData.length > 0) {
                document.getElementById('last-updated').innerText = `Dữ liệu trang ${page} (Mới nhất: ${new Date(flattenedReports[0].runTimestamp).toLocaleString('vi-VN')})`;

                const uniqueRuns = [...new Set(pageData.map(d => d.runTimestamp))];
                const activeKeywords = allHistoricalData
                    .filter(d => uniqueRuns.includes(d.timestamp))
                    .map(d => d.keywords)
                    .join('\n\n');
                renderKeywords(activeKeywords);
            }

            const list = document.getElementById('news-list');
            list.innerHTML = '';

            if (pageData.length === 0) {
                list.innerHTML = '<div class="loading">Hiện chưa có dữ liệu nào được tổng hợp.</div>';
                return;
            }

            let lastDate = "";
            pageData.forEach((item) => {
                if (item.displayDate !== lastDate) {
                    const header = document.createElement('div');
                    header.className = 'date-section';
                    header.innerHTML = `<h2 class="date-header-text">Nghiên cứu ngày: ${item.displayDate}</h2>`;
                    list.appendChild(header);
                    lastDate = item.displayDate;
                }

                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div style="width: 100%">
                        <a href="${item.link}" class="news-title" target="_blank">${item.title}</a>
                        <div class="news-meta">
                            <span class="badge">${item.source}</span>
                            <span>${item.date ? new Date(item.date).toLocaleDateString('vi-VN') : ''}</span>
                        </div>
                        <div class="news-summary">${item.summary_vn}</div>
                    </div>
                `;
                list.appendChild(card);
            });

            updatePagination();
            filterNews();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updatePagination() {
            const totalPages = Math.ceil(flattenedReports.length / itemsPerPage);
            const controls = document.getElementById('pagination-controls');

            if (totalPages <= 1) {
                controls.style.display = 'none';
                return;
            }

            controls.style.display = 'flex';
            document.getElementById('page-info').innerText = `Trang ${currentPage} / ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === totalPages;
        }

        function changePage(delta) {
            const nextP = currentPage + delta;
            renderPage(nextP);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderKeywords(keywords) {
            const clouds = document.getElementById('keyword-clouds');
            clouds.innerHTML = '';

            if (!keywords) return;

            // Handle quota error display
            if (keywords.includes('Error:')) {
                clouds.innerHTML = `<div class="tag" style="background: var(--accent-secondary); color: #000; cursor: default;">⚠️ Quota API tạm thời hết (Chỉ hiển thị dữ liệu thô)</div>`;
                return;
            }

            const structured = parseKeywords(keywords);
            
            // Get all words for frequency counting
            const allWords = [];
            for (const lang in structured) {
                allWords.push(...structured[lang]);
            }
            
            const counts = {};
            allWords.forEach(w => counts[w] = (counts[w] || 0) + 1);

            for (const [lang, words] of Object.entries(structured)) {
                if (words.length === 0) continue;
                
                // Limit to 10 unique words per language
                const uniqueWords = [...new Set(words)].slice(0, 10);
                
                const group = document.createElement('div');
                group.className = 'lang-group';
                group.innerHTML = `
                    <span class="lang-label">${lang}:</span>
                    <div class="tag-cloud">
                        ${uniqueWords.map(word => {
                            const isHot = counts[word] > 1;
                            return `<span class="tag ${isHot ? 'hot' : ''}" onclick="filterByTag('${word}')">${word}</span>`;
                        }).join('')}
                    </div>
                `;
                clouds.appendChild(group);
            }
        }

        function parseKeywords(raw) {
            const structured = { 'EN': [], 'VN': [], 'JP': [] };
            if (!raw || raw.includes('Error:')) return structured;
            
            // Handle different split formats (sometimes AI outputs with commas, sometimes with newlines)
            const lines = raw.split('\n');
            lines.forEach(line => {
                const parts = line.split(':');
                if (parts.length >= 2) {
                    const lang = parts[0].trim().toUpperCase();
                    if (structured[lang]) {
                        const words = parts[1]
                            .split(',')
                            .map(w => w.trim().replace(/^\[|\]|\.$/g, ''))
                            .filter(w => w.length > 1);
                        structured[lang].push(...words);
                    }
                }
            });
            return structured;
        }

        function filterByTag(tag) {
            let searchBar = document.getElementById('searchBar');
            searchBar.value = (searchBar.value === tag) ? '' : tag;
            filterNews();
            document.querySelector('.controls-row').scrollIntoView({ behavior: 'smooth' });
        }

        function filterNews() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('news-card');
            let dateSections = document.getElementsByClassName('date-section');
            let hasResults = false;

            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toLowerCase();
                let isMatch = text.includes(input);
                cards[i].style.display = isMatch ? "" : "none";
                if (isMatch) hasResults = true;
            }

            for (let i = 0; i < dateSections.length; i++) {
                let nextElement = dateSections[i].nextElementSibling;
                let sectionHasMatch = false;
                while (nextElement && (nextElement.classList.contains('news-card') || nextElement.classList.contains('date-section'))) {
                    if (nextElement.classList.contains('date-section')) break;
                    if (nextElement.style.display !== "none") {
                        sectionHasMatch = true;
                        break;
                    }
                    nextElement = nextElement.nextElementSibling;
                }
                dateSections[i].style.display = sectionHasMatch ? "" : "none";
            }

            let list = document.getElementById('news-list');
            let noResultMsg = document.getElementById('no-results-msg');

            if (!hasResults && input !== "") {
                if (!noResultMsg) {
                    noResultMsg = document.createElement('div');
                    noResultMsg.id = 'no-results-msg';
                    noResultMsg.className = 'loading';
                    noResultMsg.style.marginTop = '2rem';
                    noResultMsg.innerHTML = `
                        <div style="font-size: 3rem; margin-bottom: 1rem;">🔍</div>
                        <h3>Không tìm thấy bản tin nào phù hợp</h3>
                        <button onclick="clearSearch()" class="btn-refresh" style="margin-top: 1rem">Xóa tìm kiếm</button>
                    `;
                    list.appendChild(noResultMsg);
                }
                noResultMsg.style.display = "block";
            } else if (noResultMsg) {
                noResultMsg.style.display = "none";
            }
        }

        function clearSearch() {
            document.getElementById('searchBar').value = '';
            filterNews();
        }

        fetchData();
    </script>
</body>

</html>
