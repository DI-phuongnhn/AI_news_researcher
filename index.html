<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Researcher Dashboard</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        #last-updated {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .keywords {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .lang-group {
            margin-bottom: 1.25rem;
            display: flex;
            align-items: flex-start;
        }

        .lang-label {
            display: inline-block;
            min-width: 50px;
            font-weight: bold;
            color: var(--accent);
            padding-top: 4px;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: #334155;
            color: #cbd5e1;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .tag:hover {
            background: var(--accent);
            color: var(--primary-bg);
            border-color: #f1f5f9;
            transform: translateY(-1px);
        }

        .tag.hot::after {
            content: "🔥 Hot";
            background: #ef4444;
            color: white;
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .controls-row {
            display: flex;
            gap: 15px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-container {
            flex: 1;
            min-width: 250px;
        }

        .date-selector-container {
            min-width: 200px;
        }

        #searchBar,
        #dateSelector {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #searchBar:focus,
        #dateSelector:focus {
            border-color: var(--accent);
        }

        #news-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .news-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .news-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        .news-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            display: block;
            margin-bottom: 0.5rem;
        }

        .news-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .news-summary {
            line-height: 1.6;
            color: #cbd5e1;
            white-space: pre-line;
        }

        .badge {
            background: #334155;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .btn-refresh,
        .btn-action {
            background: var(--card-bg);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
        }

        .btn-refresh:hover,
        .btn-action:hover {
            background: var(--accent);
            color: var(--primary-bg);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-dim);
        }

        .date-section {
            margin-top: 2rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--accent);
            padding-left: 1rem;
        }

        .date-section h2 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--accent);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 3rem;
            margin-bottom: 4rem;
        }

        .pagination-btn {
            background: var(--card-bg);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pagination-btn:disabled {
            border-color: #334155;
            color: #334155;
            cursor: not-allowed;
        }

        .pagination-btn:not(:disabled):hover {
            background: var(--accent);
            color: var(--primary-bg);
        }

        #page-info {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>AI Technical Researcher</h1>
            <p id="last-updated">Đang tải dữ liệu...</p>
            <div style="margin-top: 1rem; display: flex; justify-content: center; gap: 10px;">
                <button onclick="fetchData()" class="btn-refresh">🔄 Cập nhật Dashboard</button>
                <a href="https://github.com/DI-phuongnhn/AI_news_researcher/actions" target="_blank"
                    class="btn-action">🚀 Chạy nghiên cứu mới (GitHub Actions)</a>
            </div>
        </header>

        <div id="quota-error" class="error-message" style="display: none;">
            ⚠️ <strong>Thông báo Quota API:</strong> Bot đã tiêu hết số lượt chạy miễn phí trong ngày hôm nay. Dữ liệu
            sẽ được cập nhật lại vào 8:00 sáng mai.
        </div>

        <div class="keywords">
            <h3
                style="margin-top: 0; margin-bottom: 1.5rem; color: var(--accent); font-size: 1.1rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem;">
                Trending Keywords
            </h3>
            <div id="keyword-clouds">
                <!-- Keywords will be injected here -->
            </div>
        </div>

        <div class="controls-row">
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="Tìm kiếm tin tức AI (title, nội dung, tag)..."
                    onkeyup="filterNews()">
            </div>
            <div class="date-selector-container">
                <select id="dateSelector" onchange="jumpToDate()">
                    <option value="">-- Chọn ngày xem nhanh --</option>
                </select>
            </div>
        </div>

        <div id="news-container">
            <div id="news-list">
                <div class="loading">Đang khởi tạo bản tin kỹ thuật...</div>
            </div>
        </div>

        <div class="pagination" id="pagination-controls" style="display: none;">
            <button id="prev-btn" class="pagination-btn" onclick="changePage(-1)">← Trang trước</button>
            <span id="page-info">Trang 1 / 1</span>
            <button id="next-btn" class="pagination-btn" onclick="changePage(1)">Trang sau →</button>
        </div>
    </div>

    <script>
        let allHistoricalData = [];
        let flattenedReports = [];
        let currentPage = 1;
        const itemsPerPage = 15;

        async function fetchData() {
            try {
                const response = await fetch('data/all_news.json');
                if (!response.ok) {
                    console.log("Historical data not found, falling back to latest_news.json");
                    const fallbackResponse = await fetch('data/latest_news.json');
                    if (!fallbackResponse.ok) throw new Error('Không thể tải file dữ liệu');
                    const data = await fallbackResponse.json();
                    allHistoricalData = [data];
                } else {
                    allHistoricalData = await response.json();
                }

                processData();
                renderDateSelector();
                renderPage(1);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('news-list').innerHTML = `<div class="loading">Lỗi: ${error.message}. Hãy đảm bảo file data/all_news.json hoặc data/latest_news.json tồn tại.</div>`;
            }
        }

        function processData() {
            flattenedReports = [];
            allHistoricalData.forEach(dayEntry => {
                const dayStr = new Date(dayEntry.timestamp).toLocaleDateString('vi-VN');
                dayEntry.reports.forEach(report => {
                    flattenedReports.push({
                        ...report,
                        runTimestamp: dayEntry.timestamp,
                        displayDate: dayStr,
                        keywords: dayEntry.keywords
                    });
                });
            });
        }

        function renderDateSelector() {
            const selector = document.getElementById('dateSelector');
            selector.innerHTML = '<option value="">-- Chọn ngày xem nhanh --</option>';

            const dates = [...new Set(flattenedReports.map(r => r.displayDate))];
            dates.forEach(date => {
                const option = document.createElement('option');
                option.value = date;
                option.innerText = date;
                selector.appendChild(option);
            });
        }

        function jumpToDate() {
            const selectedDate = document.getElementById('dateSelector').value;
            if (!selectedDate) return;

            const index = flattenedReports.findIndex(r => r.displayDate === selectedDate);
            if (index !== -1) {
                const targetPage = Math.ceil((index + 1) / itemsPerPage);
                renderPage(targetPage);

                setTimeout(() => {
                    const headers = document.getElementsByClassName('date-header-text');
                    for (let h of headers) {
                        if (h.innerText.includes(selectedDate)) {
                            h.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            break;
                        }
                    }
                }, 150);
            }
        }

        function renderPage(page) {
            currentPage = page;
            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = flattenedReports.slice(start, end);

            if (pageData.length > 0) {
                document.getElementById('last-updated').innerText = `Dữ liệu trang ${page} (Mới nhất: ${new Date(flattenedReports[0].runTimestamp).toLocaleString('vi-VN')})`;

                const uniqueRuns = [...new Set(pageData.map(d => d.runTimestamp))];
                const activeKeywords = allHistoricalData
                    .filter(d => uniqueRuns.includes(d.timestamp))
                    .map(d => d.keywords)
                    .join('\n\n');
                renderKeywords(activeKeywords);
            }

            const list = document.getElementById('news-list');
            list.innerHTML = '';

            if (pageData.length === 0) {
                list.innerHTML = '<div class="loading">Hiện chưa có dữ liệu nào được tổng hợp.</div>';
                return;
            }

            let lastDate = "";
            pageData.forEach((item) => {
                if (item.displayDate !== lastDate) {
                    const header = document.createElement('div');
                    header.className = 'date-section';
                    header.innerHTML = `<h2 class="date-header-text">Nghiên cứu ngày: ${item.displayDate}</h2>`;
                    list.appendChild(header);
                    lastDate = item.displayDate;
                }

                const card = document.createElement('div');
                card.className = 'news-card';
                card.style.marginBottom = '1.5rem';
                card.innerHTML = `
                    <a href="${item.link}" class="news-title" target="_blank">${item.title}</a>
                    <div class="news-meta">
                        <span class="badge">${item.source}</span>
                        <span>${item.date ? new Date(item.date).toLocaleDateString('vi-VN') : ''}</span>
                    </div>
                    <div class="news-summary">${item.summary_vn}</div>
                `;
                list.appendChild(card);
            });

            updatePagination();
            filterNews();
        }

        function updatePagination() {
            const totalPages = Math.ceil(flattenedReports.length / itemsPerPage);
            const controls = document.getElementById('pagination-controls');

            if (totalPages <= 1) {
                controls.style.display = 'none';
                return;
            }

            controls.style.display = 'flex';
            document.getElementById('page-info').innerText = `Trang ${currentPage} / ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === totalPages;
        }

        function changePage(delta) {
            const nextP = currentPage + delta;
            renderPage(nextP);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderKeywords(keywords) {
            const clouds = document.getElementById('keyword-clouds');
            clouds.innerHTML = '';

            if (!keywords) return;

            const structured = parseKeywords(keywords);
            const allWords = keywords.split(/[\n,]+/).map(w => w.split(':').pop().trim().replace(/^\[|\]$/g, '')).filter(w => w);
            const counts = {};
            allWords.forEach(w => counts[w] = (counts[w] || 0) + 1);

            for (const [lang, words] of Object.entries(structured)) {
                if (words.length === 0) continue;
                const uniqueWords = [...new Set(words)];
                const group = document.createElement('div');
                group.className = 'lang-group';
                group.innerHTML = `
                    <span class="lang-label">${lang}:</span>
                    <div class="tag-cloud">
                        ${uniqueWords.map(word => {
                    const isHot = counts[word] > 1;
                    return `<span class="tag ${isHot ? 'hot' : ''}" onclick="filterByTag('${word}')">${word}</span>`;
                }).join('')}
                    </div>
                `;
                clouds.appendChild(group);
            }
        }

        function parseKeywords(raw) {
            const structured = { 'EN': [], 'VN': [], 'JP': [] };
            if (!raw || raw.includes('Error:')) return structured;
            const sections = raw.split(/\n\n+/);
            sections.forEach(section => {
                const parts = section.split(':');
                if (parts.length >= 2) {
                    const lang = parts[0].trim().toUpperCase();
                    const words = parts[1].split(',').map(w => w.trim().replace(/^\[|\]$/g, ''));
                    if (structured[lang]) structured[lang].push(...words);
                }
            });
            return structured;
        }

        function filterByTag(tag) {
            let searchBar = document.getElementById('searchBar');
            searchBar.value = (searchBar.value === tag) ? '' : tag;
            filterNews();
            document.querySelector('.controls-row').scrollIntoView({ behavior: 'smooth' });
        }

        function filterNews() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.getElementsByClassName('news-card');
            let dateSections = document.getElementsByClassName('date-section');
            let hasResults = false;

            for (let i = 0; i < cards.length; i++) {
                let text = cards[i].innerText.toLowerCase();
                let isMatch = text.includes(input);
                cards[i].style.display = isMatch ? "" : "none";
                if (isMatch) hasResults = true;
            }

            for (let i = 0; i < dateSections.length; i++) {
                let nextElement = dateSections[i].nextElementSibling;
                let sectionHasMatch = false;
                while (nextElement && (nextElement.classList.contains('news-card') || nextElement.classList.contains('date-section'))) {
                    if (nextElement.classList.contains('date-section')) break;
                    if (nextElement.style.display !== "none") {
                        sectionHasMatch = true;
                        break;
                    }
                    nextElement = nextElement.nextElementSibling;
                }
                dateSections[i].style.display = sectionHasMatch ? "" : "none";
            }

            let list = document.getElementById('news-list');
            let noResultMsg = document.getElementById('no-results-msg');

            if (!hasResults && input !== "") {
                if (!noResultMsg) {
                    noResultMsg = document.createElement('div');
                    noResultMsg.id = 'no-results-msg';
                    noResultMsg.className = 'loading';
                    noResultMsg.style.marginTop = '2rem';
                    noResultMsg.innerHTML = `
                        <div style="font-size: 3rem; margin-bottom: 1rem;">🔍</div>
                        <h3>Không tìm thấy bản tin nào phù hợp</h3>
                        <button onclick="clearSearch()" class="btn-refresh" style="margin-top: 1rem">Xóa tìm kiếm</button>
                    `;
                    list.appendChild(noResultMsg);
                }
                noResultMsg.style.display = "block";
            } else if (noResultMsg) {
                noResultMsg.style.display = "none";
            }
        }

        function clearSearch() {
            document.getElementById('searchBar').value = '';
            filterNews();
        }

        fetchData();
    </script>
</body>

</html>
